name: Release candidate

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without a leading v
        required: true
        default: 0.5.5-preview.1
      channel:
        description: Release channel
        required: true
        type: choice
        options: [Nightly, Beta, Stable]
        default: Beta
      allow_unsigned:
        description: Build an unsigned public preview with all service mutations locked
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package:
    runs-on: windows-latest
    env:
      SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
      SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_RUNTIME_CONFIGURATION: ${{ vars.SIGNPATH_RUNTIME_CONFIGURATION }}
      SIGNPATH_MSI_CONFIGURATION: ${{ vars.SIGNPATH_MSI_CONFIGURATION }}
      SIGNPATH_BUNDLE_CONFIGURATION: ${{ vars.SIGNPATH_BUNDLE_CONFIGURATION }}
      ALLOW_UNSIGNED: ${{ (github.event_name == 'workflow_dispatch' && inputs.allow_unsigned) || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-preview')) }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: report-api/package-lock.json

      - name: Resolve release metadata
        shell: pwsh
        run: |
          $version = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.version }}' } else { '${{ github.ref_name }}'.TrimStart('v') }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') { throw "Invalid release version: $version" }
          $channel = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.channel }}' } elseif ($version -match 'nightly') { 'Nightly' } elseif ($version -match '(alpha|beta|preview|rc)') { 'Beta' } else { 'Stable' }
          if ($env:ALLOW_UNSIGNED -eq 'true' -and $version -notmatch '-preview(?:\.|$)') {
            throw 'Unsigned artifacts must use a preview SemVer and remain read-only.'
          }
          $signPathValues = @(
            $env:SIGNPATH_API_TOKEN,
            $env:SIGNPATH_ORGANIZATION_ID,
            $env:SIGNPATH_PROJECT_SLUG,
            $env:SIGNPATH_SIGNING_POLICY_SLUG,
            $env:SIGNPATH_RUNTIME_CONFIGURATION,
            $env:SIGNPATH_MSI_CONFIGURATION,
            $env:SIGNPATH_BUNDLE_CONFIGURATION)
          $signPathReady = @($signPathValues | Where-Object { [string]::IsNullOrWhiteSpace($_) }).Count -eq 0
          $signingMode = if ($env:ALLOW_UNSIGNED -eq 'true') {
            'UnsignedPreview'
          } elseif ($signPathReady) {
            'SignPath'
          } elseif (-not [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_BASE64)) {
            'Pfx'
          } else {
            throw 'A signed release requires complete SignPath settings or the PFX fallback credentials.'
          }
          "PRODUCT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_CHANNEL=$channel" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SIGNING_MODE=$signingMode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore, build, and test
        shell: pwsh
        run: |
          dotnet restore PCHelper.sln --locked-mode
          dotnet build PCHelper.sln -c Release --no-restore -p:Version=$env:PRODUCT_VERSION
          dotnet test PCHelper.sln -c Release --no-build
          Push-Location report-api
          npm ci
          npm run check
          npm test
          Pop-Location

      - name: Block unqualified version 1.0 release
        shell: pwsh
        run: |
          if ($env:PRODUCT_VERSION -match '^1\.0\.\d+$') {
            dotnet run --project src\PCHelper.Cli --configuration Release --no-build -- qualification --ledger docs\qualification\reference-system.json --json
            if ($LASTEXITCODE -ne 0) {
              throw 'Version 1.0 is blocked until the signed physical qualification ledger passes.'
            }
          }

      - name: Require signing authority for releasable artifacts
        shell: pwsh
        run: |
          if ($env:SIGNING_MODE -notin 'SignPath', 'Pfx', 'UnsignedPreview') {
            throw "Unsupported release signing mode: $env:SIGNING_MODE"
          }

      - name: Import release signing identity
        if: env.SIGNING_MODE == 'Pfx'
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'pchelper-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString $env:SIGNING_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1
          if ($null -eq $certificate) {
            throw 'The signing PFX did not import a private-key certificate.'
          }
          "SIGNING_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item -LiteralPath $pfx -Force

      - name: Publish application payload
        shell: pwsh
        run: |
          if ($env:SIGNING_MODE -eq 'UnsignedPreview') {
            ./scripts/publish.ps1 -Version $env:PRODUCT_VERSION -LockServiceWrites
          } elseif ($env:SIGNING_MODE -eq 'Pfx') {
            ./scripts/publish.ps1 -Version $env:PRODUCT_VERSION -RequireSigning -SigningCertificateThumbprint $env:SIGNING_THUMBPRINT
          } else {
            ./scripts/publish.ps1 -Version $env:PRODUCT_VERSION
          }

      - name: Verify unsigned preview trust boundary
        if: env.SIGNING_MODE == 'UnsignedPreview'
        shell: pwsh
        run: ./scripts/Test-RuntimePayload.ps1 -PayloadRoot artifacts/publish -ExpectedProductVersion $env:PRODUCT_VERSION -RequireServiceWritesLocked

      - name: Upload runtime payload for SignPath
        if: env.SIGNING_MODE == 'SignPath'
        id: upload-signpath-runtime
        uses: actions/upload-artifact@v7
        with:
          name: signpath-runtime-${{ env.PRODUCT_VERSION }}
          path: artifacts/publish
          if-no-files-found: error

      - name: Sign runtime payload with SignPath
        if: env.SIGNING_MODE == 'SignPath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_RUNTIME_CONFIGURATION }}
          github-artifact-id: ${{ steps.upload-signpath-runtime.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artifacts/signpath-runtime-signed
          parameters: |
            version: ${{ toJSON(env.PRODUCT_VERSION) }}

      - name: Install and verify SignPath runtime payload
        if: env.SIGNING_MODE == 'SignPath'
        shell: pwsh
        run: |
          $output = [IO.Path]::GetFullPath('artifacts/signpath-runtime-signed')
          $allowedPrefix = $output.TrimEnd('\') + '\'
          $contracts = @(Get-ChildItem -LiteralPath $output -Recurse -Filter runtime-contract.json -File)
          if ($contracts.Count -ne 1) { throw "Expected one signed runtime contract, found $($contracts.Count)." }
          $signedRoot = $contracts[0].Directory.FullName
          if (-not ($signedRoot + '\').StartsWith($allowedPrefix, [StringComparison]::OrdinalIgnoreCase)) { throw 'Signed runtime output escaped its staging directory.' }
          ./scripts/Update-RuntimeContract.ps1 -PayloadRoot $signedRoot -RequireSigning -Policy SignPathSignedRelease
          $publish = [IO.Path]::GetFullPath('artifacts/publish')
          if (-not $publish.StartsWith([IO.Path]::GetFullPath('artifacts') + '\', [StringComparison]::OrdinalIgnoreCase)) { throw 'Publish path escaped the artifact directory.' }
          Remove-Item -LiteralPath $publish -Recurse -Force
          Move-Item -LiteralPath $signedRoot -Destination $publish

      - name: Download and verify .NET Desktop Runtime
        shell: pwsh
        run: ./scripts/get-dotnet-runtime.ps1

      - name: Build MSI
        shell: pwsh
        run: |
          if ($env:SIGNING_MODE -eq 'Pfx') {
            ./scripts/build-installer.ps1 -Version $env:PRODUCT_VERSION -SkipPublish -RequireSigning -SigningCertificateThumbprint $env:SIGNING_THUMBPRINT
          } else {
            ./scripts/build-installer.ps1 -Version $env:PRODUCT_VERSION -SkipPublish
          }

      - name: Upload MSI for SignPath
        if: env.SIGNING_MODE == 'SignPath'
        id: upload-signpath-msi
        uses: actions/upload-artifact@v7
        with:
          name: signpath-msi-${{ env.PRODUCT_VERSION }}
          path: artifacts/installer/RigPilot.Installer.msi
          if-no-files-found: error
          archive: false

      - name: Sign MSI with SignPath
        if: env.SIGNING_MODE == 'SignPath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_MSI_CONFIGURATION }}
          github-artifact-id: ${{ steps.upload-signpath-msi.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artifacts/signpath-msi-signed
          parameters: |
            version: ${{ toJSON(env.PRODUCT_VERSION) }}

      - name: Install and verify SignPath MSI
        if: env.SIGNING_MODE == 'SignPath'
        shell: pwsh
        run: |
          $signed = @(Get-ChildItem artifacts/signpath-msi-signed -Recurse -Filter *.msi -File)
          if ($signed.Count -ne 1) { throw "Expected one signed MSI, found $($signed.Count)." }
          $signature = Get-AuthenticodeSignature -LiteralPath $signed[0].FullName
          if ($signature.Status -ne 'Valid') { throw "SignPath MSI signature is $($signature.Status)." }
          Copy-Item -LiteralPath $signed[0].FullName -Destination artifacts/installer/RigPilot.Installer.msi -Force

      - name: Build Burn bundle around signed MSI
        shell: pwsh
        run: |
          $runtime = Get-ChildItem artifacts\dependencies\windowsdesktop-runtime-10.*-win-x64.exe | Sort-Object LastWriteTimeUtc -Descending | Select-Object -First 1 -ExpandProperty FullName
          if ($env:SIGNING_MODE -eq 'Pfx') {
            ./scripts/build-installer.ps1 -Version $env:PRODUCT_VERSION -SkipPublish -SkipMsiBuild -RuntimeInstaller $runtime -RequireSigning -SigningCertificateThumbprint $env:SIGNING_THUMBPRINT
          } else {
            ./scripts/build-installer.ps1 -Version $env:PRODUCT_VERSION -SkipPublish -SkipMsiBuild -RuntimeInstaller $runtime
          }

      - name: Upload bundle for SignPath
        if: env.SIGNING_MODE == 'SignPath'
        id: upload-signpath-bundle
        uses: actions/upload-artifact@v7
        with:
          name: signpath-bundle-${{ env.PRODUCT_VERSION }}
          path: artifacts/installer/RigPilot.Bundle.exe
          if-no-files-found: error
          archive: false

      - name: Sign bundle with SignPath
        if: env.SIGNING_MODE == 'SignPath'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_BUNDLE_CONFIGURATION }}
          github-artifact-id: ${{ steps.upload-signpath-bundle.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: artifacts/signpath-bundle-signed
          parameters: |
            version: ${{ toJSON(env.PRODUCT_VERSION) }}

      - name: Install and verify SignPath bundle
        if: env.SIGNING_MODE == 'SignPath'
        shell: pwsh
        run: |
          $signed = @(Get-ChildItem artifacts/signpath-bundle-signed -Recurse -Filter *.exe -File)
          if ($signed.Count -ne 1) { throw "Expected one signed bundle, found $($signed.Count)." }
          $signature = Get-AuthenticodeSignature -LiteralPath $signed[0].FullName
          if ($signature.Status -ne 'Valid') { throw "SignPath bundle signature is $($signature.Status)." }
          Copy-Item -LiteralPath $signed[0].FullName -Destination artifacts/installer/RigPilot.Bundle.exe -Force

      - name: Verify signed release boundary
        if: env.SIGNING_MODE != 'UnsignedPreview'
        shell: pwsh
        run: |
          $contract = Get-Content artifacts/publish/runtime-contract.json -Raw | ConvertFrom-Json
          foreach ($component in @($contract.components)) {
            $path = Join-Path artifacts/publish ([string]$component.relativePath)
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ($signature.Status -ne 'Valid') { throw "Runtime signature is not valid: $path ($($signature.Status))." }
          }
          foreach ($path in 'artifacts/installer/RigPilot.Installer.msi', 'artifacts/installer/RigPilot.Bundle.exe') {
            $signature = Get-AuthenticodeSignature -LiteralPath $path
            if ($signature.Status -ne 'Valid') { throw "Installer signature is not valid: $path ($($signature.Status))." }
          }
          ./scripts/Test-RuntimePayload.ps1 -PayloadRoot artifacts/publish -ExpectedProductVersion $env:PRODUCT_VERSION

      - name: Create release archive
        shell: pwsh
        run: |
          $release = 'artifacts\release'
          New-Item -ItemType Directory -Path $release -Force | Out-Null
          Compress-Archive -Path artifacts\publish\* -DestinationPath "$release\RigPilot-$env:PRODUCT_VERSION-win-x64.zip" -CompressionLevel Optimal
          Copy-Item artifacts\installer\RigPilot.Installer.msi "$release\RigPilot-$env:PRODUCT_VERSION-win-x64.msi"
          Copy-Item artifacts\installer\RigPilot.Bundle.exe "$release\RigPilot-$env:PRODUCT_VERSION-setup.exe"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: artifacts/publish
          format: spdx-json
          output-file: artifacts/release/RigPilot-${{ env.PRODUCT_VERSION }}.spdx.json
          upload-artifact: false

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem artifacts\release -File | Get-FileHash -Algorithm SHA256 | ForEach-Object { "{0} *{1}" -f $_.Hash.ToLowerInvariant(), $_.Path.Split('\')[-1] } | Set-Content artifacts\release\SHA256SUMS.txt -Encoding UTF8

      - name: Attest release provenance
        uses: actions/attest@v4
        with:
          subject-path: artifacts/release/*

      - uses: actions/upload-artifact@v7
        with:
          name: RigPilot-${{ env.PRODUCT_VERSION }}-${{ env.RELEASE_CHANNEL }}
          path: artifacts/release/*
          if-no-files-found: error

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @"
          Automated draft. Hardware write claims remain limited to COMPATIBILITY.md evidence.

          Unsigned previews are build-locked read-only. Signed releases require a manual signing approval.

          [Code signing policy](https://github.com/NiccTM/rigpilot/blob/${{ github.sha }}/CODE_SIGNING.md) · [Privacy policy](https://github.com/NiccTM/rigpilot/blob/${{ github.sha }}/PRIVACY.md)
          "@
          gh release create "${{ github.ref_name }}" artifacts/release/* --draft --verify-tag --title "RigPilot $env:PRODUCT_VERSION ($env:RELEASE_CHANNEL)" --notes $notes
